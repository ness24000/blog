services:
  app:
    build: .
    ports:
      - 8080:8080
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    environment:
      LOG_LEVEL: ${LOG_LEVEL}
      PATH_TO_DB: ${PATH_TO_DB}
      ADMIN_KEY: ${ADMIN_KEY}
      DOMAIN_NAME: ${DOMAIN_NAME}
      MAIL_SERVER: ${MAIL_SERVER}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      
    entrypoint: ["gunicorn", "-b", "0.0.0.0:8080", "blog_app:app"]
    