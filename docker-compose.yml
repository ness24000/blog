services:
  app:
    build: .
    volumes:
      - ./app:/app/app
      - ./data:/app/data
    environment:
      ADMIN_KEY: "$22_Aragon_22$"
    entrypoint: ["gunicorn", "-b", "0.0.0.0:8080", "blog_app:app"]

  reverse_proxy:
    build: ./nginx
    ports:
      - 80:80
      - 443:443
    entrypoint: ["bash", '/enable_https.sh']