{% extends 'base.html' %}
{% block title %} Add post{% endblock %}

{% block content %}

<form class="add_post_form" method="post">
  {{ form.hidden_tag() }}
  <p> {{ form.title(placeholder="title")}}</p>
  <p> {{ form.date(placeholder="date") }}</p>
  <p> {{ form.content(placeholder="content") }}</p>
  <input type="submit" value="Add post">

</form>

{% endblock %}
