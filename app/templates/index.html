{% extends 'base.html' %}
{% block title %} Main page {% endblock %}

{% block content %}

{% for post in posts %}

<a class="preview_link_wrapper" href="/post/{{ post[0] }}">
    <div class="preview">
        <h3> {{ post[1] }} </h3>
        <p class="date"> {{ post[2] }} </p>
        {{ post[3]|safe }}
    </div>
</a>
{% endfor %}

{% endblock %}
