{% extends 'base.html' %}
{% block title %} Main page {% endblock %}

{% block content %}

{% for post in posts %}

<h2 style="margin-bottom: 0;"> <a class="post_link" href="/post/{{ post[0] }}"> {{ post[1] }} </a> </h2>
<p style="margin-top: 5px;"> {{ post[2] }} </p>
<p>{{ post[3]|safe }}
 <a class="post_link" href="/post/{{ post[0] }}"> read more</a>
</p> 

<div style="height:10px;"></div>
{% endfor %}

{% endblock %}
