<!DOCTYPE html>
<html>
  <head>
    <title>{% block title %} {% endblock %}</title>
    <meta name="viewport" content="width:device-width,initial-scale=1.0" />
    <link rel="stylesheet" href="{{
    url_for('static',filename='style.css') }}">
  </head>
  <body>
    <div style="height: 2.5vw;"> </div>
    <h1 class="title" style="position:sticky;">Text(o)s</h1>
    <div style="height: 1.5vw;"> </div>
    
    <div class="square">
      <a class="square_small" href="{{ url_for('index') }}"> Recent </a>
      <a class="square_small" href="{{ url_for('about') }}"> About </a>
      <div class="square_small"> Search </div>
    </div>    
    <div style="height: 2vw; clear: both;"> </div>

    <div class="paragraph">
        {% block content %} {% endblock %}
    </div>
  </body>
</html>
